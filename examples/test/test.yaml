app-name: "my-app"
debug: false
version: "0.1.0"
port: 8080
tags:
  - go
  - tui
server:
  host: localhost
  port: 8080
  tls: false
  allowed-ips:
    - 127.0.0.1
    - 10.0.0.0/8
logging:
  level: info
  show-caller: false
workers:
  - name: "default"
    concurrency: 2
    queue: "main"
    tags:
      - critical
  - name: "background"
    concurrency: 1
    queue: "low"
unknown-key: "flagged by ctrl+l validate"
