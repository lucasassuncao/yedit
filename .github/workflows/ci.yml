name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          make fmt
          if ! git diff --exit-code; then
            echo ""
            echo "❌ Code is not formatted. Run 'make fmt' locally and commit the result."
            exit 1
          fi
          echo "✅ Code is properly formatted."

      - name: Check dependencies
        run: |
          go mod tidy
          if ! git diff --exit-code; then
            echo ""
            echo "❌ go.mod or go.sum is out of date. Run 'go mod tidy' locally and commit the result."
            exit 1
          fi
          echo "✅ Dependencies are up to date."

      - name: Test
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
            coverage.xml

      - name: Check docs
        run: |
          make docs
          if ! git diff --exit-code; then
            echo ""
            echo "❌ Documentation is out of date. Run 'make docs' locally and commit the result."
            exit 1
          fi
          echo "✅ Documentation is up to date."

      - name: Lint
        run: make lint

      - name: Security
        run: make security
